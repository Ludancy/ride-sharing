<div class="login-container">
    <mat-card class="modern-auth-card">
        <mat-card-header class="justify-center pt-2">
            <div class="flex flex-col items-center">
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Llanito Express Logo">
                </div>
                <mat-card-title class="auth-title">Bienvenido</mat-card-title>
                <mat-card-subtitle class="auth-subtitle">Ingresa a tu cuenta para continuar</mat-card-subtitle>
            </div>
        </mat-card-header>

        <mat-card-content class="pt-4">
            <form class="flex flex-col w-100" [formGroup]="authFormulario" (ngSubmit)="login()">

                <mat-form-field class="w-100 mb-3" appearance="outline">
                    <mat-label>Correo Electrónico</mat-label>
                    <mat-icon matPrefix color="primary" style="opacity: 0.8;">email</mat-icon>
                    <input type="email" matInput placeholder="usuario@correo.com" formControlName="email_user" required>
                </mat-form-field>
            
                <mat-form-field class="w-100 mb-3" appearance="outline">
                    <mat-label>Contraseña</mat-label>
                    <mat-icon matPrefix color="primary" style="opacity: 0.8;">lock</mat-icon>
                    <input type="password" matInput placeholder="Tu contraseña" formControlName="password" required>
                </mat-form-field>
    
                <div class="flex flex-col items-center mt-4">
                    <button mat-flat-button color="primary" class="w-100 auth-main-btn" type="submit">
                        Ingresar
                    </button> 

                    <button mat-stroked-button type="button" class="w-100 auth-demo-btn mt-3" (click)="loginDemo()">
                        <mat-icon style="margin-right: 8px;">account_circle</mat-icon>
                        Usuario Demo
                    </button>

                    <a class="mt-4 text-sm auth-bottom-link" routerLink="/auth/registro">
                        <span class="auth-text-gray">¿No tienes cuenta?</span> 
                        <span class="auth-text-highlight">Regístrate aquí</span>
                    </a> 
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
