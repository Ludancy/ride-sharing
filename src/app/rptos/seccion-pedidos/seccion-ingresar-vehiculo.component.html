<div class="flex flex-col w-100 p-4">
  <mat-card class="glass-card w-100" style="max-width: 800px; margin: 0 auto;">
    <mat-card-header class="justify-center pt-2 pb-2">
      <mat-card-title style="color: var(--primary-color);">Registrar Vehículo</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form class="flex flex-col mt-2" [formGroup]="vehiculoFormulario" (ngSubmit)="guardarVehiculo()">

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
          <mat-form-field class="w-100" appearance="outline" *ngFor="let item of items">
            <mat-label>{{item.name}}</mat-label>
            <input type="text" matInput placeholder="{{item.name}}" formControlName="{{item.dist}}" required>
          </mat-form-field>
        </div>

        <div class="flex justify-center mt-3 mb-2">
          <button mat-flat-button color="primary" class="w-80" style="padding: 24px 0; font-size: 1.1rem; border-radius: 25px;" type="submit">
            <mat-icon>save</mat-icon>
            Ingresar Vehículo
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
