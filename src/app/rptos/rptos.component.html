<div class="header-container">
    <div class="header-content">
        <!-- Logo Section -->
        <a routerLink="/rptos/inicio" class="logo-section">
            <div class="logo-wrapper">
                <img src="assets/logo.png" alt="Logo" class="logo">
            </div>
            <span class="app-name">Llanito Express</span>
        </a>

        <!-- Navigation -->
        <div class="nav-section">
            <a routerLink="/rptos/inicio" 
               routerLinkActive="active"
               [routerLinkActiveOptions]="{exact: false}"
               class="nav-button">
                <mat-icon>person</mat-icon>
                <span>Perfil</span>
            </a>
            
            <a routerLink="/rptos/productos" 
               routerLinkActive="active"
               class="nav-button">
                <mat-icon>dashboard</mat-icon>
                <span>Sistema</span>
            </a>
            
            <a routerLink="/rptos/pedidos" 
               routerLinkActive="active"
               *ngIf="user()?.rol === 3"
               class="nav-button">
                <mat-icon>directions_car</mat-icon>
                <span>Vehículos</span>
            </a>
        </div>

        <!-- User Section -->
        <div class="user-section">
            <div class="user-info" [matMenuTriggerFor]="profileMenu" style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <div class="user-avatar">
                    <mat-icon>account_circle</mat-icon>
                </div>
                <span class="user-email">{{user()?.email_user || 'yepeziudys5@gmail.com'}}</span>
                <mat-icon style="color: white; font-size: 18px; width: 18px; height: 18px; margin-left: -4px;">arrow_drop_down</mat-icon>
            </div>
            
            <mat-menu #profileMenu="matMenu" xPosition="before" class="premium-profile-menu">
                <div class="menu-user-header" style="padding: 14px 18px; min-width: 220px; display: flex; flex-direction: column; border-bottom: 1px solid var(--border-light); background: rgba(99, 102, 241, 0.04);">
                    <span style="font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary-color); margin-bottom: 2px;">Llanito Express</span>
                    <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-main); word-break: break-all;">{{user()?.email_user || 'yepeziudys5@gmail.com'}}</span>
                </div>
                
                <button mat-menu-item routerLink="/rptos/inicio" style="display: flex; align-items: center; gap: 8px;">
                    <mat-icon style="color: var(--primary-color);">person</mat-icon>
                    <span style="font-weight: 500;">Mi Perfil</span>
                </button>
                
                <button mat-menu-item routerLink="/rptos/productos" style="display: flex; align-items: center; gap: 8px;">
                    <mat-icon style="color: var(--accent-color);">dashboard</mat-icon>
                    <span style="font-weight: 500;">Sistema</span>
                </button>
                
                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 4px 0;">
                
                <button mat-menu-item (click)="onLogout()" style="display: flex; align-items: center; gap: 8px;">
                    <mat-icon style="color: #ef4444;">exit_to_app</mat-icon>
                    <span style="font-weight: 600; color: #ef4444;">Cerrar Sesión</span>
                </button>
            </mat-menu>
        </div>
    </div>
</div>

<router-outlet></router-outlet>
