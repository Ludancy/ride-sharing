<div class="header-container">
    <div class="header-content">
        <!-- Logo Section -->
        <a routerLink="/rptos/inicio" class="logo-section">
            <div class="logo-wrapper">
                <img src="assets/logo.png" alt="Logo" class="logo">
            </div>
            <span class="app-name">Llanito Express</span>
        </a>

        <!-- Navigation -->
        <div class="nav-section">
            <a routerLink="/rptos/inicio" 
               routerLinkActive="active"
               [routerLinkActiveOptions]="{exact: false}"
               class="nav-button">
                <mat-icon>person</mat-icon>
                <span>Perfil</span>
            </a>
            
            <a routerLink="/rptos/productos" 
               routerLinkActive="active"
               class="nav-button">
                <mat-icon>dashboard</mat-icon>
                <span>Sistema</span>
            </a>
            
            <a routerLink="/rptos/pedidos" 
               routerLinkActive="active"
               *ngIf="user()?.rol === 3"
               class="nav-button">
                <mat-icon>directions_car</mat-icon>
                <span>Vehículos</span>
            </a>
        </div>

        <!-- User Section -->
        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar">
                    <mat-icon>account_circle</mat-icon>
                </div>
                <span class="user-email">{{user()?.email_user}}</span>
            </div>
            
            <button class="logout-button" (click)="onLogout()">
                <mat-icon>exit_to_app</mat-icon>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </div>
</div>

<router-outlet></router-outlet>
